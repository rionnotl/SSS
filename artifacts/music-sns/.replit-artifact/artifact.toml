kind = "web"
previewPath = "/"
title = "音楽SNS"
version = "1.0.0"
id = "artifacts/music-sns"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24850

[services.development]
run = "pnpm --filter @workspace/music-sns run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-sns", "run", "build" ]
publicDir = "artifacts/music-sns/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24850"
BASE_PATH = "/"
